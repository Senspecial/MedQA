# 直接回答样本构造配置
# 使用 DeepSeek 批量生成"不需要搜索、直接回答"的 Agent SFT 数据
#
# 输出格式（assistant 回复）:
#   <think>简要分析判断</think>
#   <answer>直接回答内容</answer>
#
# 用法:
#   python src/training/scripts/run_direct_answer_construction.py \
#       --config config/sft_direct_answer_config.yaml
#
#   # 快速测试
#   python src/training/scripts/run_direct_answer_construction.py \
#       --config config/sft_direct_answer_config.yaml --max_samples 5

# ============================================
# DeepSeek API 配置
# ============================================
deepseek:
  api_key: ""                                       # 通过环境变量 DEEPSEEK_API_KEY 设置，或在此填写
  base_url: "https://api.deepseek.com/v1"
  model: "deepseek-chat"
  temperature: 0.85        # 稍高温度以增加多样性
  max_tokens: 2048
  max_retries: 3
  retry_delay: 2.0
  request_interval: 0.5

# ============================================
# 输出配置
# ============================================
output:
  output_path: "data/SFT_Agent/sft_direct_answer_deepseek.jsonl"
  target_samples: 500    # 目标生成 300 条

# ============================================
# 并发配置
# ============================================
concurrency:
  num_workers: 3
  save_every: 20

# ============================================
# 种子问题（DeepSeek 将基于这些种子扩展生成多样化样本）
# ============================================
seed_questions:
  # ── 日常对话 ──
  greetings:
    - "你好"
    - "你好呀，请问在吗"
    - "嗨"
    - "在吗"
    - "请问一下"
    - "你是谁"
    - "你能做什么"
    - "谢谢你"
    - "好的我知道了"
    - "再见"
    - "没有其他问题了"
    - "hello"
    - "你好，我想咨询一个问题"
    - "麻烦问一下"
    - "帮我看看"

  # ── 常识性医学问题（不需要搜索就能回答） ──
  common_medical:
    - "感冒了怎么办"
    - "发烧了怎么处理"
    - "正常血压是多少"
    - "正常体温是多少"
    - "什么是BMI"
    - "头疼怎么缓解"
    - "拉肚子了怎么办"
    - "被蚊子咬了怎么办"
    - "怀孕不能吃什么"
    - "多喝水有什么好处"
    - "晚上失眠怎么办"
    - "牙疼怎么缓解"
    - "眼睛干涩怎么办"
    - "鼻子出血怎么处理"
    - "扭伤了怎么处理"
    - "晕车怎么办"
    - "嗓子疼怎么办"
    - "中暑了怎么办"
    - "皮肤过敏怎么办"
    - "便秘怎么办"
    - "低血糖有什么症状"
    - "孕妇可以喝咖啡吗"
    - "小孩发烧怎么物理降温"
    - "老人摔倒了怎么办"
    - "被猫抓伤要打针吗"
    - "吃了过期食物怎么办"
    - "运动后肌肉酸痛怎么办"
    - "胃疼怎么缓解"
    - "腰疼是怎么回事"
    - "血糖正常值是多少"

  # ── 需要澄清/引导的模糊问题 ──
  clarification:
    - "我不舒服"
    - "我生病了"
    - "帮我看一下这个检查报告"
    - "吃什么药好"
    - "这个病严不严重"
    - "我该怎么办"
    - "我是不是得了什么病"
    - "我家人身体不好"
    - "我最近总是不舒服"
    - "医生说我指标不正常"

  # ── 非医学问题（礼貌拒绝/引导回医学话题） ──
  off_topic:
    - "今天天气怎么样"
    - "帮我写一篇作文"
    - "推荐一部电影"
    - "你会做数学题吗"
    - "帮我翻译一下英文"

# ============================================
# 每个种子问题的扩展倍数
# ============================================
expansion:
  greetings: 2             # 每个种子生成 2 个变体
  common_medical: 4        # 每个种子生成 4 个变体（重点扩充）
  clarification: 3         # 每个种子生成 3 个变体
  off_topic: 2             # 每个种子生成 2 个变体
